  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 48.8566, "lng": 2.3522, "title": "Paris", "slug": "paris"}];
    var revData=[{"lat": 48.886705, "lng": 2.343104, "name": "Basilique du Sacr\u00e9-C\u0153ur de Montmartre", "rating": 5, "text": "Perfect panoramic view. 7 eur each person, but 290 steps. Really tiring but definitely worth it", "address": "35 Rue du Chevalier de la Barre, 75018 Paris, France", "color": "#16a34a"}, {"lat": 48.85837, "lng": 2.294481, "name": "Eiffel Tower", "rating": 5, "text": "", "address": "Av. Gustave Eiffel, 75007 Paris, France", "color": "#16a34a"}, {"lat": 48.861688, "lng": 2.28928, "name": "Jardins du Trocad\u00e9ro", "rating": 5, "text": "Best place to view Eiffel Tower", "address": "Pl. du Trocad\u00e9ro et du 11 Novembre, 75016 Paris, France", "color": "#16a34a"}, {"lat": 48.870839, "lng": 2.30319, "name": "Ladur\u00e9e", "rating": 5, "text": "Good desserts :)", "address": "75 Av. des Champs-\u00c9lys\u00e9es, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.873516, "lng": 2.309373, "name": "Librairie Auguste Blaizot", "rating": 5, "text": "A library to be in love. Just wonderful ancient old books. Employees were really helpful too.", "address": "164 Rue du Faubourg Saint-Honor\u00e9, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.875475, "lng": 2.306441, "name": "BOWL UP healthy food", "rating": 5, "text": "Nice food! They only have menu in French which is a problem. Rather than that, staff is helpful, delicious and healthy.", "address": "7bis Rue de Monceau, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.873792, "lng": 2.295028, "name": "Arc de Triomphe", "rating": 5, "text": "", "address": "Pl. Charles de Gaulle, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.881509, "lng": 2.299084, "name": "Il \u00e9tait une oie dans le Sud Ouest", "rating": 5, "text": "Traditional French restaurant. Duck leg was awesome. Other duck appetizers were ok", "address": "8 Rue Gustave Flaubert, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.881279, "lng": 2.298746, "name": "Perotti Franck", "rating": 5, "text": "Good quiche and creme de brulee", "address": "11 Rue Gustave Flaubert, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.878504, "lng": 2.291404, "name": "Librairie Saint Ferdinand", "rating": 1, "text": "Only religious books", "address": "26 Rue d'Armaill\u00e9, 75017 Paris, France", "color": "#dc2626"}, {"lat": 48.877228, "lng": 2.292727, "name": "WINESS", "rating": 5, "text": "Nice store! After we asked what is pastis liquor like, owner let us taste a little bit! :)", "address": "42 Rue des Acacias, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.879886, "lng": 2.295159, "name": "Le Lutin", "rating": 5, "text": "Really friendly staff", "address": "2bis Rue Fourcroy, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.881852, "lng": 2.294637, "name": "L'Entre deux Vins", "rating": 5, "text": "Nice wine store. You can have 3 different reds and whites per glass per day. We also had chance to try of cassis liquor. Owner is really helpful.", "address": "39 Rue Laugier, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.871506, "lng": 2.306402, "name": "Le Sens Unique", "rating": 5, "text": "Good ambiance, glass wines are good. Awesome food, duck leg was perfect.", "address": "47 Rue de Ponthieu, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.881178, "lng": 2.298459, "name": "MAM par St\u00e9phanie Le Quellec - Fourcroy", "rating": 5, "text": "Awesome pecan cookies!", "address": "22 Rue Fourcroy, 75017 Paris, France", "color": "#16a34a"}, {"lat": 48.874459, "lng": 2.308063, "name": "Truffes Folies", "rating": 5, "text": "Awesome place to eat! A little bit expensive but all worth it. Soup and ravioli was our favorite.", "address": "48 Rue de Berri, 75008 Paris, France", "color": "#16a34a"}, {"lat": 48.877215, "lng": 2.299733, "name": "Le XXV", "rating": 3, "text": "Too long lines. Employee was really quick but not enough for this crowd. Quiches were good but a little bit expensive.", "address": "225 Rue du Faubourg Saint-Honor\u00e9, 75008 Paris, France", "color": "#ca8a04"}, {"lat": 48.877222, "lng": 2.297222, "name": "Le P'tit Wagram", "rating": 4, "text": "Crispy pesto gouda was just awesome. Onion soup was ok. Selection of wines are good but served a little bit more warm.", "address": "45 Av. de Wagram, 75017 Paris, France", "color": "#65a30d"}, {"lat": 48.879703, "lng": 2.345518, "name": "Jolis M\u00f4mes", "rating": 4, "text": "Nice bar, good selection of white wines, nice appetizers such as truffle gouda", "address": "5 Rue Turgot, 75009 Paris, France", "color": "#65a30d"}, {"lat": 48.884604, "lng": 2.333717, "name": "Boulangerie P\u00e2tisserie Sylvain Marie", "rating": 4, "text": "Awesome quiches! Best in town. Cake with pistachio was not good. Staff is a little bit slow.", "address": "12 Rue Coustou, 75018 Paris, France", "color": "#65a30d"}, {"lat": 48.881495, "lng": 2.298188, "name": "Hotel Elysees Flaubert Paris", "rating": 2, "text": "Location is good but anything than that is not good. Old hotel, all facilities are old and neglected. Rooms are little. Sound isolation is 0.\n\nNot worth for the price.", "address": "19 Rue Rennequin, 75017 Paris, France", "color": "#ea580c"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[41.3, -5.2],[51.1, 9.6]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (21)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  
</body>
