    var revData=[{"lat": 41.189195, "lng": -7.540864, "name": "Quinta do Bomfim", "rating": 5, "text": "Perfect view. Good wines. Glass wines are a little bit expensive comparing to the bottles but they really have good variety of wines.", "address": "Largo do Videira, 5085-060 Pinh\u00e3o, Portugal", "color": "#16a34a"}, {"lat": 41.190221, "lng": -7.543411, "name": "Rufete", "rating": 4, "text": "Nice traditional Portuguese food!", "address": "R. Ant\u00f3nio Manuel Saraiva 13A, 5085-037 Pinh\u00e3o, Portugal", "color": "#65a30d"}, {"lat": 41.242695, "lng": -7.568749, "name": "Quinta do Beijo, Sociedade Agr\u00edcola e Comercial Lda", "rating": 5, "text": "Really good wines, also perfect winery tour!", "address": "R. de S\u00e3o Bento No 1, 5060-011, Portugal", "color": "#16a34a"}, {"lat": 41.1536, "lng": -7.644365, "name": "Quinta Val Moreira", "rating": 5, "text": "Good wines, good winery tour!", "address": "Quinta do Val Moreira \u2013 Marmelal \u2013 Sto Adri\u00e3o, 5110-672, Portugal", "color": "#16a34a"}, {"lat": 41.174083, "lng": -8.518654, "name": "Douro Valley Wine Tours", "rating": 5, "text": "Awesome tour company for Douro!", "address": "R. das Mimosas 4510, 4510-607 S\u00e3o Pedro da Cova, Portugal", "color": "#16a34a"}, {"lat": 41.147356, "lng": -8.616273, "name": "Igreja do Carmo", "rating": 5, "text": "Amazing building", "address": "R. do Carmo, 4050-164 Porto, Portugal", "color": "#16a34a"}, {"lat": 41.141893, "lng": -8.61489, "name": "Mercado Ferreira Borges", "rating": 5, "text": "Visited at the weekend and good designs exist for sale such as tshirts, wooden jobs etc. really liked the stuff.", "address": "R. da Bolsa 19, 4050-253 Porto, Portugal", "color": "#16a34a"}, {"lat": 41.140771, "lng": -8.614325, "name": "Casa do Infante", "rating": 3, "text": "Not too much interesting stuff", "address": "R. da Alf\u00e2ndega 10, 4050-029 Porto, Portugal", "color": "#ca8a04"}, {"lat": 41.139959, "lng": -8.609448, "name": "Lu\u00eds I Bridge", "rating": 5, "text": "Watching sunset from the bridge is priceless", "address": "Porto, Portugal", "color": "#16a34a"}, {"lat": 41.137614, "lng": -8.612979, "name": "Espa\u00e7o Porto Cruz", "rating": 3, "text": "Tasting for regular wines is nice but the port wines served in tasting are not too good quality", "address": "Largo Miguel Bombarda 23, 4400-222 Vila Nova de Gaia, Portugal", "color": "#ca8a04"}, {"lat": 41.1461, "lng": -8.606699, "name": "Church of Saint Ildefonso", "rating": 4, "text": "Entrance not needed in my opinion, only looking from just the entrance would be enough.", "address": "Pra\u00e7a da Batalha s/n, 4000-101 Porto, Portugal", "color": "#65a30d"}, {"lat": 41.146382, "lng": -8.604825, "name": "Caf\u00e9 Santiago", "rating": 5, "text": "Best dinner ever! Really enjoyed the quality of Francesinha.\nAlso the waiter knows nearly all languages :)", "address": "R. de Passos Manuel 226, 4000-382 Porto, Portugal", "color": "#16a34a"}, {"lat": 41.149882, "lng": -8.605655, "name": "Chapel of Souls", "rating": 5, "text": "Perfect structure!", "address": "R. de Santa Catarina 428, 4000-444 Porto, Portugal", "color": "#16a34a"}, {"lat": 41.146906, "lng": -8.614775, "name": "Livraria Lello", "rating": 4, "text": "Tickets definitely needed for entrance but you can also buy them while waiting on the line. At least 15-20 minutes waiting in the line happening. Place is so crowded. However still an original place to definitely worth visiting.", "address": "R. das Carmelitas 144, 4050-161 Porto, Portugal", "color": "#65a30d"}, {"lat": 41.14722, "lng": -8.612078, "name": "Hard Rock Cafe", "rating": 3, "text": "Comparing the prices of other similar restaurants in Porto, this is way more expensive. Shrimps are perfect as always.", "address": "Rua do Almada 120, 4050-031 Porto, Portugal", "color": "#ca8a04"}, {"lat": 41.147925, "lng": -8.612536, "name": "NOLA KITCHEN", "rating": 4, "text": "Good place to have breakfast. Menu is completely different than regular ones, but worth to try.\n\nInside of the restaurant smells a lot of food so outside is a much wiser choice.", "address": "Pra\u00e7a D. Filipa de Lencastre 25, 4050-259 Porto, Portugal", "color": "#65a30d"}, {"lat": 41.14826, "lng": -8.612194, "name": "Ris8tto da Baixa", "rating": 5, "text": "Awesome food. Both pesto and mushroom risotto ones really perfect. Dish seems a little bit small at first but definitely fulfilling. Wine selection is also nice.", "address": "Rua do Almada 203, 4050-038 Porto, Portugal", "color": "#16a34a"}, {"lat": 41.148386, "lng": -8.611612, "name": "The Editory Boulevard Aliados Hotel - Preferred Hotels", "rating": 4, "text": "Rooms were a little bit small but super functional. Really enjoyed the complimentary port wine, chestnuts and apples. Location is super, really in the center. Design of the hotel is original but sometimes it is a little bit creepy :)", "address": "Av. dos Aliados 141 147, 4000-067 Porto, Portugal", "color": "#65a30d"}, {"lat": 38.796307, "lng": -9.396024, "name": "Quinta da Regaleira", "rating": 5, "text": "Wonderful place.", "address": "2710-567 Sintra, Portugal", "color": "#16a34a"}, {"lat": 38.794622, "lng": -9.39689, "name": "Initiation Well", "rating": 5, "text": "Just a wonderful place. Amazing. One time experience. Do not miss it if you are visiting Lisbon.", "address": "Quinta da Regaleira, R. Barbosa du Bocage 9, 2710-567 Sintra, Portugal", "color": "#16a34a"}, {"lat": 38.787585, "lng": -9.390609, "name": "National Palace of Pena", "rating": 5, "text": "Wonderful. It was not too crowded on weekdays at afternoon November. Buying tickets makes sense for not waiting in the lines.", "address": "Estrada da Pena, 2710-609 Sintra, Portugal", "color": "#16a34a"}, {"lat": 38.793748, "lng": -9.454372, "name": "Ref\u00fagio do Ciclista", "rating": 5, "text": "Good food! We had mixed meat plate and it was more than expected!", "address": "Largo do Chafariz, 2705-262 Colares, Portugal", "color": "#16a34a"}, {"lat": 38.714994, "lng": -9.124683, "name": "National Pantheon", "rating": 5, "text": "Great building", "address": "Campo de Santa Clara, 1100-471 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.714888, "lng": -9.12765, "name": "Church of St. Vincent de Fora", "rating": 5, "text": "Seems nice for visiting", "address": "Largo de S\u00e3o Vicente, 1100-472 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.79423, "lng": -9.420636, "name": "Park and Palace of Monserrate", "rating": 5, "text": "Unbelievable place. Palace is not the greatest but the garden is. All the trees etc just awesome. Definitely from another world.", "address": "R. Barbosa du Bocage 136, 2710-405 Sintra, Portugal", "color": "#16a34a"}, {"lat": 38.709283, "lng": -9.134343, "name": "Maria Catita", "rating": 5, "text": "Really nice food! We got octopus, tuna tapas, lobster-shellfish and prawns and all of them were really nice. Wine selections for glass were also ok. Definitely worth to try.", "address": "R. dos Bacalhoeiros 30, 1100-389 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.709834, "lng": -9.132953, "name": "Lisbon Cathedral", "rating": 4, "text": "A nice one to see when passing by", "address": "Largo da S\u00e9 1, 1100-585 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.713909, "lng": -9.133476, "name": "Castelo de S\u00e3o Jorge", "rating": 5, "text": "Just an amazing place. A must see. We watched sunset in here and the view was awesome.", "address": "R. de Santa Cruz do Castelo, 1100-129 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.712038, "lng": -9.140613, "name": "Carmo Archaeological Museum", "rating": 4, "text": "A really unique place to see. Also museum is nice. Price is 5 eur which is ok comparing to the what they have inside.", "address": "Largo do Carmo, 1200-092 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.710228, "lng": -9.137428, "name": "Casa Portuguesa do Pastel de Bacalhau", "rating": 4, "text": "A really different taste to experience. Personally it is not my style but still the presentation is really nice.", "address": "R. Augusta 106, 1100-053 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.713442, "lng": -9.140696, "name": "Ginginha do Carmo", "rating": 5, "text": "Awesome place to taste Ginginha! Serving lady was also super nice.", "address": "Cal\u00e7ada do Carmo 37 A, 1200-090 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.708445, "lng": -9.136824, "name": "Rua Augusta Arch", "rating": 5, "text": "Just an amazing place to see.", "address": "R. Augusta 2, 1100-053 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.708215, "lng": -9.136727, "name": "Pra\u00e7a do Com\u00e9rcio", "rating": 5, "text": "", "address": "1100-148 Lisbon, Portugal", "color": "#16a34a"}, {"lat": 38.706735, "lng": -9.145945, "name": "Garrafeira Nacional", "rating": 5, "text": "We came here by just chance but actually had a chance to taste a 1878 port wine. Amazing!! Super recommending to check it out to everyone visiting.", "address": "Av. 24 de Julho 49, 1200-161 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.706756, "lng": -9.145821, "name": "Manteigaria", "rating": 4, "text": "Nice natas!!", "address": "Av. 24 de Julho 50, 1200-109 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.711712, "lng": -9.143775, "name": "Limoncello", "rating": 4, "text": "Good food. I had a limoncello salad and it was really both delicious and also satisfying.", "address": "R. do Norte 61, 1200-284 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.69751, "lng": -9.203228, "name": "Past\u00e9is de Bel\u00e9m", "rating": 5, "text": "Had some quite fews nata on the both Lisbon and Porto and this place does actually the best all over! An essential must to have in Lisbon.", "address": "R. de Bel\u00e9m 84 92, 1300-085 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.693597, "lng": -9.205711, "name": "Monument to the Discoveries", "rating": 5, "text": "Just an amazing monument!", "address": "Av. Bras\u00edlia, 1400-038 Lisboa, Portugal", "color": "#16a34a"}, {"lat": 38.722252, "lng": -9.139337, "name": "Taguscruises Boat Tours & Yacht Charter", "rating": 4, "text": "Tour was really nice however the guys that took our group to the tour were a little bit too talky and had some intense jokes", "address": "Doca do Bom Sucesso, Avenida de Bras\u00edlia, 1400-038 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.69287, "lng": -9.215892, "name": "Bel\u00e9m Tower", "rating": 4, "text": "", "address": "Av. Bras\u00edlia, 1400-038 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.727068, "lng": -9.142224, "name": "Cooking Lisbon", "rating": 4, "text": "Chef is really nice and the menu was also good. However it took a little bit longer than we thought so we were a little bit exhausted in the end. Additionally air condition system was not working very good I think because all of our clothes and even our hairs were smelling food afterwards.", "address": "R. Bernardim Ribeiro 9, 1150-068 Lisboa, Portugal", "color": "#65a30d"}, {"lat": 38.724835, "lng": -9.160352, "name": "Dom Pedro Lisboa Hotel, a member of Radisson Individuals", "rating": 3, "text": "Rooms were big but air conditioner system is a mess. Hot was not working and it was cold in the rooms even if they changed the whole air condition. Also some food smells coming from there time to time. Breakfast was really nice.", "address": "Av. Eng. Duarte Pacheco 24, 1070-110 Lisboa, Portugal", "color": "#ca8a04"}, {"lat": 38.719191, "lng": -9.156373, "name": "Ninja Buns - Lisboa", "rating": 3, "text": "Food was nice, wine choices were not too good.", "address": "Av. \u00c1lvares Cabral 24A, 1250-017 Lisboa, Portugal", "color": "#ca8a04"}, {"lat": 38.709134, "lng": -9.13334, "name": "Taberna Moderna", "rating": 4, "text": "Really nice dishes! Service was also nice too.", "address": "R. dos Bacalhoeiros 18A, 1100-070 Lisboa, Portugal", "color": "#65a30d"}];

        {maxWidth:280}).addTo(map);

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'

        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');

      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
