<body>

    <div class="posts-section"><h2>All Posts</h2><a href="../posts/katmandu.html" style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:8px;background:var(--card-bg);border-left:3px solid var(--accent);text-decoration:none;color:inherit;margin-bottom:.5rem;transition:background .2s"><div style="flex:1"><div style="font-weight:500;font-size:.9375rem;color:var(--text)">Kathmandu<span style="font-size:.7rem;padding:.1rem .3rem;border-radius:3px;background:#c2410c;color:#fff;font-weight:600;margin-left:.35rem">7/10</span></div><div style="font-size:.75rem;color:var(--text-muted)">City Guide · Oct 1, 2022 · 4 min</div></div></a>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 27.7172, "lng": 85.324, "title": "Kathmandu", "slug": "katmandu"}];
    var revData=[{"lat": 27.731082, "lng": 85.284558, "name": "Mums Homestay & Apartments- A Real Homestay Experience", "rating": 5, "text": "Good ambience, nice food!", "address": "Nagarjune-1, Radhakrishna Temple, 6 Manakamanamarga, Street, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.67498, "lng": 85.324791, "name": "Shakya Siddhartha Thanka Painting School", "rating": 5, "text": "Do not buy any paintings before seeing here. They give the same ones half cheap prices comparing to Kathmandu center ones. Master paintings are super nice and very well detailed. Amazing work.", "address": "M8FF+XWV, Kwalakhu Rd, Lalitpur 44700, Nepal", "color": "#16a34a"}, {"lat": 27.714394, "lng": 85.311588, "name": "MANAKAMANA HANDICRAFTS & SINGING BOWL HOUSE", "rating": 5, "text": "Best bowls in the town! Also one of the cheapest. Do not buy a bowl without talking with here.", "address": "Narsingh Chowk Marg, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.710545, "lng": 85.317864, "name": "Hard Rock Cafe Kathmandu", "rating": 5, "text": "Same ambiance within other hard rock cafe\u2019s all around the world as well as same menu. Good restaurant above Kathmandu standards.", "address": "Hard Rock Cafe, Sherpa Mall, Durbar Marg, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.617233, "lng": 85.275772, "name": "Neydo Tashi Pharping Monastery", "rating": 5, "text": "Super beautiful ambience. Really good monastery with awesome view and atmosphere. A must visit. If you can find a chance to see a ceremony, then definitely a must to do also!", "address": "J78G+V8R, Dakshinkali 44600, Nepal", "color": "#16a34a"}, {"lat": 27.605107, "lng": 85.26347, "name": "Dakshinkali Temple", "rating": 1, "text": "No need to go as touristical visit unless you are a believer. All place is trash and dirty, also bloody. Worst experience in Kathmandu.", "address": "Pharping-Kulekhani Road, Dakshinkali 44600, Nepal", "color": "#dc2626"}, {"lat": 27.67693, "lng": 85.277922, "name": "Chilancho Stupa", "rating": 4, "text": "Cannot compare within the other stupas but if you have time in town and want to see new places, you can visit", "address": "M7GH+Q5F, Kirtipur 44618, Nepal", "color": "#65a30d"}, {"lat": 27.712099, "lng": 85.318055, "name": "Orient Cafe", "rating": 5, "text": "Really nice restaurant. Good food!", "address": "P869+R62, Durbar Marg, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.7149, "lng": 85.290396, "name": "Swayambhu Mahachaitya", "rating": 5, "text": "If possible, try to visit when the weather is not cloudy because view seems great.", "address": "Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.672698, "lng": 85.325321, "name": "Patan Darbar Square", "rating": 5, "text": "Bhaktapur and Patan durbar squares a must visit in Kathmandu.", "address": "Lalitpur 44600, Nepal", "color": "#16a34a"}, {"lat": 27.710512, "lng": 85.348812, "name": "Pashupatinath Temple", "rating": 5, "text": "This one has an unique atmosphere. Must go in the late afternoon or evening, far better experience within the darkness.", "address": "44621 Pashupati Nath Road, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.721469, "lng": 85.362035, "name": "Buddha Stupa", "rating": 5, "text": "One of the best touristical places that should be seen in Kathmandu.", "address": "Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.671359, "lng": 85.429328, "name": "Nyatapola Temple", "rating": 5, "text": "One of the best temples in any of the durbars.", "address": "Taumadhi Square, Bhaktapur 44800, Nepal", "color": "#16a34a"}, {"lat": 27.67207, "lng": 85.428295, "name": "Bhaktapur Durbar Square", "rating": 5, "text": "Far more cleaner and a better square, especially comparing to Kathmandu one. Definitely worth visiting. Also gift shops are much cheaper comparing to the center.", "address": "Durbar square, Bhaktapur 44800, Nepal", "color": "#16a34a"}, {"lat": 27.715418, "lng": 85.310128, "name": "Northfield Cafe and Jesse James Bar", "rating": 4, "text": "A nice restaurant. Cheese balls were amazing. Toilets are a little bit dirty.", "address": "Kathmandu 44600, Nepal", "color": "#65a30d"}, {"lat": 27.715493, "lng": 85.310465, "name": "Kathmandu's Beni Handicrafts", "rating": 5, "text": "This one definitely needs more attention. Perfect volunteer work, all of the stuff made from recycled stuff via young Nepalese women which are supported from this shop.", "address": "P886+55W, Chaksibari Marg, Kathmandu 44600, Nepal", "color": "#16a34a"}, {"lat": 27.704274, "lng": 85.307463, "name": "Kathmandu Durbar Square", "rating": 3, "text": "Comparing to other durbar squares, this one is way more chaotic. Too many street sellers which annoys after some period of time.", "address": "Kathmandu 44600, Nepal", "color": "#ca8a04"}, {"lat": 27.699192, "lng": 85.356674, "name": "Tribhuvan International Airport", "rating": 2, "text": "Too chaotic, super slow staff. If you have international flights, definitely a good advice to come before 3 hours of it.", "address": "Ring Rd, Kathmandu 44600, Nepal", "color": "#ea580c"}, {"lat": 27.715357, "lng": 85.312755, "name": "Aloft Kathmandu Thamel", "rating": 5, "text": "Really nice hotel, far better comparing to the standards of Kathmandu. Elevators are a little bit problematic + too much food smell due to lack of AC on restaurant floor, otherwise no problems at all.", "address": "Chhaya Devi Complex, Amrit Marg, Kathmandu 44600, Nepal", "color": "#16a34a"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[26.4, 80],[30.5, 88.2]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (19)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
</body>
</html>
