  <script>
    var postData=[{"lat": 64.1466, "lng": -21.9426, "title": "Iceland", "slug": "iceland"}];
    var revData=[{"lat": 64.148034, "lng": -21.940641, "name": "101 Bistro", "rating": 5, "text": "Best fish & chips in the world! Far more better than comparing with English ones, definitely worth to try :)", "address": "Austurstr\u00e6ti 3, 101 Reykjav\u00edk, Iceland", "color": "#16a34a"}, {"lat": 64.141934, "lng": -21.927056, "name": "Hallgrimskirkja", "rating": 5, "text": "Really liked the minimalism. Organ is also super impressive. View from the top is awesome indeed.", "address": "Hallgr\u00edmstorg 1, 101 Reykjav\u00edk, Iceland", "color": "#16a34a"}, {"lat": 63.422337, "lng": -19.008173, "name": "Restaurant Su\u00f0ur-V\u00edk", "rating": 5, "text": "Great design, good food. Salad was very nice.", "address": "Su\u00f0urv\u00edkurvegur 1, 870 V\u00edk, Iceland", "color": "#16a34a"}, {"lat": 63.88154, "lng": -22.45254, "name": "Blue Lagoon", "rating": 4, "text": "Cold in winter, especially in the afternoon-evenings. Could be not the best idea :) otherwise, perfect view.", "address": "Nor\u00f0urlj\u00f3savegur 9, 240 Grindav\u00edk, Iceland", "color": "#65a30d"}, {"lat": 63.418371, "lng": -19.0102, "name": "Lava Show in V\u00edk", "rating": 5, "text": "It was totally informative, scientific and fascinating performance! Thought as a touristic activity at first but seeing an actual lava was awesome.", "address": "V\u00edkurbraut 5 870, 870 Vik, Iceland", "color": "#16a34a"}, {"lat": 63.404105, "lng": -19.043696, "name": "Black Beach Restaurant", "rating": 4, "text": "Fish was nice, soup was super big (be careful if you are ordering as pre-meal, it could be shared by two) and desserts are super huge (it could be shared by three :))", "address": "Reynisfj\u00f6ru, Reynishverfisvegur, 871 V\u00edk, Iceland", "color": "#65a30d"}, {"lat": 63.40574, "lng": -19.071619, "name": "Reynisfjara Beach", "rating": 5, "text": "One of the most mystical places in the world. Just awesome.\n\nWaves are a little bit dangerous so be careful!", "address": "Iceland", "color": "#16a34a"}, {"lat": 63.556944, "lng": -19.302778, "name": "S\u00f3lheimaj\u00f6kull", "rating": 5, "text": "One of the most peaceful places in the world. Climbing into it also one of the best experiences in my life. Will do it again in the future!", "address": "871, Iceland", "color": "#16a34a"}, {"lat": 63.402225, "lng": -19.130189, "name": "Dyrh\u00f3laey Lighthouse", "rating": 5, "text": "Awesome view point, a must place to visit.", "address": "CV29+VWV, 871 Vik, Iceland", "color": "#16a34a"}, {"lat": 63.418132, "lng": -18.993603, "name": "H\u00f3tel Kr\u00eda", "rating": 4, "text": "Nice hotel. Good design, perfect view, lovely and quick staff. Check in was like only in a second.\nOnly problem in the rooms are bathroom doors are not actually normal doors so a little off privacy in terms of sound :)\n\nRestaurant was also nice. 5 stars to that.", "address": "Sl\u00e9ttuvegur, 870 V\u00edk, Iceland", "color": "#65a30d"}, {"lat": 64.001601, "lng": -16.881186, "name": "Sv\u00ednafellsj\u00f6kull Glacier", "rating": 5, "text": "Unbelievable place", "address": "2429+JGW, 785 Sv\u00ednafell, Iceland", "color": "#16a34a"}, {"lat": 63.899683, "lng": -16.608774, "name": "Fosshotel Glacier Lagoon", "rating": 5, "text": "Had stopped for restaurant with a group reservation for 15. Got pumpkin soup + salmon and all is perfect. Staff was quick and nice. Place is fancy.", "address": "Hnappavellir, 785 \u00d6r\u00e6fi, Iceland", "color": "#16a34a"}, {"lat": 64.044334, "lng": -16.177662, "name": "Diamond Beach", "rating": 5, "text": "Just amazing! Definitely out from the world :)", "address": "781, Iceland", "color": "#16a34a"}, {"lat": 63.532052, "lng": -19.511371, "name": "Sk\u00f3gafoss", "rating": 5, "text": "We got this place in a very bad weather situation and really undecided to go into the top. However I can say that after 15 min of walk, it was definitely worth to see the view from top. A recommendation would be going nearest possible to the waterfall from downside, better view than the top.", "address": "861, Iceland", "color": "#16a34a"}, {"lat": 63.745721, "lng": -18.159462, "name": "G\u00f6ngulei\u00f0 um Eldhraun", "rating": 5, "text": "From another planet :)", "address": "PRWR+76M, 881 Kirkjub\u00e6jarklaustur, Iceland", "color": "#16a34a"}, {"lat": 63.620863, "lng": -19.986449, "name": "Glj\u00fafrab\u00fai", "rating": 5, "text": "Experience inside of the waterfall is awesome. Definitely a place to visit in any season.", "address": "249, 861, Iceland", "color": "#16a34a"}, {"lat": 64.148311, "lng": -21.941706, "name": "Center Hotels Plaza", "rating": 3, "text": "Location is perfect, breakfast is between ok and good. Staff is good but hotel in general is old. Within a few renovation it would be better.", "address": "A\u00f0alstr\u00e6ti 4- 6, 101 Reykjav\u00edk, Iceland", "color": "#ca8a04"}, {"lat": 64.211146, "lng": -21.260371, "name": "\u00deingvallavegur parking viewpoint", "rating": 5, "text": "A good stop for photos in winter, especially on a sunny day with snow on the ground.", "address": "36, 806, Iceland", "color": "#16a34a"}, {"lat": 64.150829, "lng": -21.946337, "name": "Forr\u00e9ttabarinn", "rating": 5, "text": "Awesome food, loved everything we had: duck salad, quesadilla and fish of the day. Perfect staff!", "address": "N\u00fdlendugata 14, 101 Reykjav\u00edk, Iceland", "color": "#16a34a"}, {"lat": 64.041278, "lng": -20.885147, "name": "Keri\u00f0 Crater", "rating": 5, "text": "Just amazing! View from top side is perfect, definitely full path should be leaded around the crater.", "address": "805 Klausturholar, Iceland", "color": "#16a34a"}, {"lat": 64.327072, "lng": -20.119948, "name": "Gullfoss Falls", "rating": 5, "text": "A perfect nature, definitely a place to visit. Went in winter and unfortunately the path was closed which is really near to the waterfall. But still worth to see in real world!", "address": "846, Iceland", "color": "#16a34a"}, {"lat": 64.310372, "lng": -20.30236, "name": "Geysir", "rating": 5, "text": "Definitely a place to add to the tour program. Sorry for not seeing the big geysir exploitation due to it is not active anymore, it is still nice to see small one active and alive.", "address": "806, Iceland", "color": "#16a34a"}, {"lat": 63.527167, "lng": -19.511166, "name": "Skogafoss Bistro Bar", "rating": 5, "text": "Good place, quick and helpful staff + fast service. Salmon was very tasty.", "address": "861 Hvolsv\u00f6llur, Iceland", "color": "#16a34a"}, {"lat": 64.32542, "lng": -20.129147, "name": "Gullfoss - Panorama Restaurant - Cafe - Shop", "rating": 3, "text": "Really nice staff and very quick service. We had a meat soup as a group. While service is awesome, soup taste was not so good. Too much salt and cabbage flavor :)", "address": "Gullfoss, 801 Selfossi, Iceland", "color": "#ca8a04"}, {"lat": 64.150141, "lng": -21.943446, "name": "Le KocK", "rating": 5, "text": "Perfect burgers, loved them! Definitely worth to try.\nFor drinks if you want to drink a beer, choosing draft one would be more make sense than the bottled ones in terms of both taste and price.", "address": "Tryggvagata 12, 101 Reykjav\u00edk, Iceland", "color": "#16a34a"}, {"lat": 63.417598, "lng": -19.014127, "name": "Halld\u00f3rskaffi", "rating": 1, "text": "We came to the restaurant at 7:30 as a 15 people of a group and had our dinner at 9:15!! They even gave us the water after half an hour. Our tour guide take the orders because staff was too busy. Definitely not a good place for big groups because they do not have capacity of staff for that. After waiting so long, taste of food would be not too important.", "address": "V\u00edkurbraut 28, 870 V\u00edk, Iceland", "color": "#dc2626"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[63.3, -24.5],[66.5, -13.5]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (26)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
