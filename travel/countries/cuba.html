    var postData=[{"lat": 23.1136, "lng": -82.3666, "title": "Cuba", "slug": "cuba"}];
    var revData=[{"lat": 22.612223, "lng": -83.715817, "name": "Benito\u2019s Tabacco Farm", "rating": 5, "text": "Just an awesome place. Benito is a really cool guy. Really liked the farm.", "address": "J77M+7RC, Vi\u00f1ales, Cuba", "color": "#16a34a"}, {"lat": 22.619511, "lng": -83.742771, "name": "Mural of Prehistory", "rating": 5, "text": "Awesome ambiance", "address": "J794+RV5, Vi\u00f1ales, Cuba", "color": "#16a34a"}, {"lat": 22.618781, "lng": -83.742133, "name": "Restaurant Mural de la Prehistoria", "rating": 5, "text": "Pina colada is just the best in the country", "address": "J795+G49, Vi\u00f1ales, Cuba", "color": "#16a34a"}, {"lat": 22.671467, "lng": -83.705644, "name": "Restaurante Rancho San Vicente", "rating": 5, "text": "Chicken and potato is really nice, good music", "address": "M7CV+HPQ, Vi\u00f1ales, Cuba", "color": "#16a34a"}, {"lat": 22.669354, "lng": -83.707276, "name": "Indian Cave", "rating": 5, "text": "Perfect ambiance!", "address": "M79V+P3X, Vi\u00f1ales, Cuba", "color": "#16a34a"}, {"lat": 23.135, "lng": -82.358, "name": "Legendarios del Guajirito Buena Vista Social Club", "rating": 5, "text": "Best entertainment in Cuba ever. 35 usd entrance within 3 drinks included without meal. Definitely worth it. Need reservation before because it is full.", "address": "Zulueta 660/ Apocada y Gloria,, Cuba", "color": "#16a34a"}, {"lat": 23.137417, "lng": -82.357392, "name": "El Floridita Bar", "rating": 5, "text": "Daiquiri is really the best", "address": "4JPV+X29, Obispo, La Habana, Cuba", "color": "#16a34a"}, {"lat": 23.140893, "lng": -82.3561, "name": "Ivan Chef Justo", "rating": 3, "text": "Too expensive comparing to Cuba standards", "address": "4JRV+9H2 La Esquina, Aguacate, La Habana, Cuba", "color": "#ca8a04"}, {"lat": 23.137422, "lng": -82.35958, "name": "Hotel Inglaterra", "rating": 4, "text": "About restaurant: good food, live music", "address": "416 P.\u00ba de Mart\u00ed, La Habana, Cuba", "color": "#65a30d"}, {"lat": 23.139065, "lng": -82.357196, "name": "Azotea 1940", "rating": 1, "text": "They just called us for food to upstairs, but after we were there, they told kitchen is open but nothing exists as a meal", "address": "253 Av. B\u00e9lgica, La Habana, Cuba", "color": "#dc2626"}, {"lat": 23.133138, "lng": -81.681582, "name": "Mirador de Bacunayagua", "rating": 5, "text": "Good view, original pina colada", "address": "Mirador Puente de Bacunayagua, Bacunayagua, Cuba", "color": "#16a34a"}, {"lat": 23.184362, "lng": -81.185807, "name": "Brisas del Caribe", "rating": 1, "text": "Beach was awesome but that was it. Food was just disgusting, all inclusive hotel but they do not have mojito, pina colada as cocktails. Even their options of alcohol are worst. Not worth it at all.", "address": "5RM7+PMW, Varadero, Cuba", "color": "#dc2626"}, {"lat": 22.402647, "lng": -79.979367, "name": "Che Guevara Mausoleum", "rating": 5, "text": "Well designed mausoleum. Emotional.", "address": "Memorial Emesto Che Guevara, Santa Clara, Cuba", "color": "#16a34a"}, {"lat": 22.401868, "lng": -79.999961, "name": "Los Caneyes", "rating": 3, "text": "They have open buffet but food is ok.", "address": "C222+P2V, Santa Clara, Cuba", "color": "#ca8a04"}, {"lat": 21.805632, "lng": -79.983998, "name": "Il Trionfo", "rating": 3, "text": "Place is well designed and food is fast however not a quite italian restaurant at all :) if they change their concept to another, they would be more successful. Everything is too salty.\n\nOnly italian restaurant in the world which does not have a wine list at the menu.", "address": "502 C. Desenga\u00f1o, Trinidad, Cuba", "color": "#ca8a04"}, {"lat": 21.805757, "lng": -79.98383, "name": "Restaurante La Nueva Era", "rating": 4, "text": "Place is really well decorated, nice food. However too slow service. Seafood pasta was worth to try.\n\nLive music was just perfect!", "address": "518 C. Desenga\u00f1o, Trinidad, Cuba", "color": "#65a30d"}, {"lat": 21.806248, "lng": -79.985379, "name": "Taberna La Canch\u00e1nchara", "rating": 5, "text": "Canchanchara is one of the best cocktails I drank in Cuba. It was just awesome!!!", "address": "90 C. Real del Jig\u00fce, Trinidad 62600, Cuba", "color": "#16a34a"}, {"lat": 21.804923, "lng": -79.983927, "name": "Bar Do\u00f1a Leonor", "rating": 5, "text": "Best pina colada in town!!!", "address": "R238+XC8, Trinidad, Cuba", "color": "#16a34a"}, {"lat": 21.808212, "lng": -79.981078, "name": "Disco Ayala", "rating": 4, "text": "Really nice place to definitely see. Original disco in cave. Inside is really hot however, not enough air conditioning.", "address": "R259+7HM, Trinidad 62600, Cuba", "color": "#65a30d"}, {"lat": 21.735222, "lng": -80.000505, "name": "Ranch\u00f3n Anc\u00f3n", "rating": 3, "text": "Food is really good, big portions, especially seafood is awesome. Coconut was really nice. However the facility is really awful. Toilets are really dirty, no shower at the beach.", "address": "PXPX+3QQ, Playa Anc\u00f3n, Cuba", "color": "#ca8a04"}, {"lat": 22.146414, "lng": -80.452705, "name": "Tomas Terry Theater", "rating": 5, "text": "Old and historical theatre. Worth to visit.", "address": "4GWW+HXJ, 2700 San Carlos, Cienfuegos, Cuba", "color": "#16a34a"}, {"lat": 22.126389, "lng": -80.451389, "name": "Club Cienfuegos", "rating": 3, "text": "Nice sea view but food was ok.", "address": "4GGX+HC5, Cienfuegos, Cuba", "color": "#ca8a04"}, {"lat": 23.140794, "lng": -82.352202, "name": "La Bodeguita Del Medio", "rating": 4, "text": "Cool place, music was good. Not the best mojito in town. Meals are ok.", "address": "4JRX+847, Empedrado, La Habana, Cuba", "color": "#65a30d"}, {"lat": 23.144022, "lng": -82.353528, "name": "Atat\u00fcrk statue", "rating": 5, "text": "Can't pass by without paying respects :)", "address": "4JVW+JH5, La Habana, Cuba", "color": "#16a34a"}, {"lat": 23.150168, "lng": -82.356595, "name": "Castle of the Three Kings of Morro", "rating": 5, "text": "Please stop by their souvenir shop. Really nice people-souvenirs as well as good prices.", "address": "5J2V+34X, La Habana, Cuba", "color": "#16a34a"}, {"lat": 23.121439, "lng": -82.423055, "name": "Parque Miramar", "rating": 5, "text": "Just a wonderful place. Beautiful ficus trees.", "address": "4HCG+HQG, La Habana, Cuba", "color": "#16a34a"}, {"lat": 23.142563, "lng": -82.385428, "name": "Hotel Vedado 500", "rating": 1, "text": "Dirty sheets/towels, definitely bring with you. Hot water is low, internet problems always.", "address": "calle 17 entre l y m vedado, Cuba", "color": "#dc2626"}, {"lat": 23.138806, "lng": -82.354267, "name": "Gran Caf\u00e9 \"El Louvre\"", "rating": 4, "text": "Music is perfect. Drink prices are good. Food is ok.", "address": "4JPR+W7J, Blvd. de San Rafael, La Habana, Cuba", "color": "#65a30d"}, {"lat": 23.135524, "lng": -82.349831, "name": "Don Eduardo Alegre", "rating": 4, "text": "Seafood pasta was really good. However place is a little bit expensive, especially drinks.", "address": "4MP2+633, Muralla, La Habana, Cuba", "color": "#65a30d"}];
