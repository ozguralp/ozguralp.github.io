    <div class="posts-section"><h2>All Posts</h2><a href="../posts/wroclaw.html" style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:8px;background:var(--card-bg);border-left:3px solid var(--accent);text-decoration:none;color:inherit;margin-bottom:.5rem;transition:background .2s"><div style="flex:1"><div style="font-weight:500;font-size:.9375rem;color:var(--text)">Wrocław<span style="font-size:.7rem;padding:.1rem .3rem;border-radius:3px;background:#c2410c;color:#fff;font-weight:600;margin-left:.35rem">7/10</span></div><div style="font-size:.75rem;color:var(--text-muted)">City Guide · Jun 5, 2022 · 1 min</div></div></a>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 51.1079, "lng": 17.0385, "title": "Wroc\u0142aw", "slug": "wroclaw"}];
    var revData=[{"lat": 51.106989, "lng": 17.05663, "name": "Forma P\u0142ynna Beach Bar", "rating": 4, "text": "Good cocktails and great place to hangout. A little bit mosquito problem in summer :)", "address": "Wybrze\u017ce Stanis\u0142awa Wyspia\u0144skiego 20, 50-370 Wroc\u0142aw, Poland", "color": "#65a30d"}, {"lat": 51.1132, "lng": 17.034828, "name": "FC Caffe", "rating": 3, "text": "Place is nice, tried pistachio special coffee one but it was not quite good.", "address": "Ku\u017anicza 30, 50-138 Wroc\u0142aw, Poland", "color": "#ca8a04"}, {"lat": 51.109096, "lng": 17.032418, "name": "Pierogarnia Rynek 26", "rating": 5, "text": "Awesome food! Mix plate for 2 is quite big but delicious :)", "address": "Rynek 26, 50-101 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.11421, "lng": 17.046517, "name": "Wroc\u0142aw Cathedral", "rating": 5, "text": "A must see in Wroclaw, especially in the night.\n\nView is also awesome from the towers.", "address": "Plac Katedralny 18, 50-329 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.112335, "lng": 17.042904, "name": "Bulwar Bistro & Cafe", "rating": 4, "text": "Good view", "address": "bulwar Xawerego Dunikowskiego, 50-155 Wroc\u0142aw, Poland", "color": "#65a30d"}, {"lat": 51.105383, "lng": 17.028938, "name": "Witold Pilecki Memorial", "rating": 5, "text": "Inspiring", "address": "Promenada Staromiejska, 50-042 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.108496, "lng": 17.026063, "name": "Charlotte", "rating": 4, "text": "Good quiche\u2019s. Service is a little bit slow.", "address": "\u015awi\u0119tego Antoniego 2/4, 50-073 Wroc\u0142aw, Poland", "color": "#65a30d"}, {"lat": 51.11109, "lng": 17.030424, "name": "Prewar", "rating": 5, "text": "Traditional nice and cheap bar", "address": "\u015awi\u0119tego Miko\u0142aja 81, 50-126 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.111791, "lng": 17.029774, "name": "Tulip Hotels - Wroclaw Patio", "rating": 3, "text": "Good location. But the rooms have the worst sound isolation, especially standard rooms. Heard really out loud snoring voices which made us not sleep at all. Luckily there was another room empty and we changed our room. 3 points for the employee who made that change. But the hotel was full and we were lucky too. So if you plan to stay in here, at least not take standard rooms :)", "address": "Kie\u0142ba\u015bnicza 25, 50-110 Wroc\u0142aw, Poland", "color": "#ca8a04"}, {"lat": 51.114005, "lng": 17.034463, "name": "University of Wroc\u0142aw", "rating": 5, "text": "Perfect view in the night.", "address": "plac Uniwersytecki 1, 50-137 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.110638, "lng": 17.047458, "name": "National Museum in Wroc\u0142aw", "rating": 5, "text": "Awesome view!", "address": "plac Powsta\u0144c\u00f3w Warszawy 5, 50-153 Wroc\u0142aw, Poland", "color": "#16a34a"}, {"lat": 51.107549, "lng": 17.043256, "name": "Pinta Wroc\u0142aw", "rating": 4, "text": "Good snacks and beers. IPA ones was too aromatical and really different from classic IPA\u2019s, e.g not red.", "address": "Podwale 83, 50-414 Wroc\u0142aw, Poland", "color": "#65a30d"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[49, 14.1],[54.8, 24.2]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (12)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
</body>
