  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 45.4642, "lng": 9.19, "title": "Milan", "slug": "milan"}, {"lat": 45.4408, "lng": 12.3155, "title": "Venice", "slug": "venice"}, {"lat": 45.4384, "lng": 10.9917, "title": "Verona", "slug": "verona"}];
    var revData=[{"lat": 45.434167, "lng": 12.338472, "name": "Piazza San Marco", "rating": 5, "text": "One of the best squares ever", "address": "P.za San Marco, 30100 Venezia VE, Italy", "color": "#16a34a"}, {"lat": 45.438996, "lng": 10.994357, "name": "Arena di Verona", "rating": 4, "text": "Good view of city. Ancient landmark. Cannot compare with colosseum but still nice to see.", "address": "P.za Bra, 1, 37121 Verona VR, Italy", "color": "#65a30d"}, {"lat": 45.464098, "lng": 9.191926, "name": "Duomo di Milano", "rating": 5, "text": "Best cathedral ever.", "address": "P.za del Duomo, 20122 Milano MI, Italy", "color": "#16a34a"}, {"lat": 45.443635, "lng": 10.996966, "name": "Al Canton", "rating": 4, "text": "Good place to hangout. Nice wine list to be served as glass.", "address": "Piazza Erbe, 36, 37121 Verona VR, Italy", "color": "#65a30d"}, {"lat": 45.435391, "lng": 12.340033, "name": "Rossopomodoro Venezia San Marco", "rating": 5, "text": "Perfect place to eat. Pizzas are really nice as well as the desserts.", "address": "Calle Larga S. Marco, 404/408, 30124 Venezia VE, Italy", "color": "#16a34a"}, {"lat": 45.436175, "lng": 12.339791, "name": "Dal Moro's", "rating": 3, "text": "We ate here 4-5 years ago and that was awesome. Had a chance to eat here again after 5 years and things got changed. Still nice but not perfect. Prices are more expensive as well as portions are low :(", "address": "Calle de la Casseleria, 5324, 30122 Venezia VE, Italy", "color": "#ca8a04"}, {"lat": 45.438073, "lng": 12.342307, "name": "Libreria Acqua Alta", "rating": 3, "text": "Too crowded. A little bit overrated.", "address": "C. Longa Santa Maria Formosa, 5176b, 30122 Venezia VE, Italy", "color": "#ca8a04"}, {"lat": 45.435606, "lng": 12.327688, "name": "Niki Bar", "rating": 3, "text": "Slow service but taste was nice.", "address": "Calle del Traghetto Vecchio, 2883, 30125 Venezia VE, Italy", "color": "#ca8a04"}, {"lat": 45.441931, "lng": 10.998302, "name": "La Bottega del Tartufo Verona", "rating": 5, "text": "We bought some truffle spices and sauces and we really enjoyed them.", "address": "Via Cappello, 19, 37121 Verona VR, Italy", "color": "#16a34a"}, {"lat": 45.441949, "lng": 10.998659, "name": "Casa di Giulietta", "rating": 1, "text": "Most overrated place ever :)", "address": "Via Cappello, 23, 37121 Verona VR, Italy", "color": "#dc2626"}, {"lat": 45.441316, "lng": 10.998309, "name": "Gastronomia Stella", "rating": 5, "text": "Awesome food. Melanzane was perfect.", "address": "Via Stella, 11, 37121 Verona VR, Italy", "color": "#16a34a"}, {"lat": 45.438982, "lng": 10.987312, "name": "Pasticceria Castelvecchio", "rating": 3, "text": "Expensive, comparing to the quality.", "address": "Corso Cavour, 37121 Verona VR, Italy", "color": "#ca8a04"}, {"lat": 45.442807, "lng": 10.99673, "name": "Berber\u00e8 Pizzeria", "rating": 3, "text": "Pizza was ok. House wine is not good.", "address": "Via Pellicciai, 2, 37121 Verona VR, Italy", "color": "#ca8a04"}, {"lat": 45.477762, "lng": 9.203169, "name": "Hotel Sanpi Milano", "rating": 4, "text": "Good location. Hotel is OK but some halls are designed weirdly.", "address": "Via Lazzaro Palazzi, 18, 20124 Milano MI, Italy", "color": "#65a30d"}, {"lat": 45.44132, "lng": 10.998917, "name": "Elk Bakery - The Garden", "rating": 5, "text": "Good and healthy breakfast.", "address": "Via Cappello, 39, 37121 Verona VR, Italy", "color": "#16a34a"}, {"lat": 45.441331, "lng": 10.993375, "name": "VIVAVINO WINE SHOP", "rating": 5, "text": "Good shop! Really nice and different stuff about wines.", "address": "Via Guglielmo Oberdan, 18, 37121 Verona VR, Italy", "color": "#16a34a"}, {"lat": 45.459062, "lng": 9.182564, "name": "Yguana Caf\u00e8", "rating": 5, "text": "Best aperitivo place ever. 1 drink for 13\u20ac which includes all you can eat for the night. Really delicious food.", "address": "Via Papa Gregorio XIV, 16, 20123 Milano MI, Italy", "color": "#16a34a"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[36.6, 6.6],[47.1, 18.5]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (17)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
</body>
