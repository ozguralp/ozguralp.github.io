  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>

  <script>
    var postData=[{"lat": 47.4979, "lng": 19.0402, "title": "Budapest", "slug": "budapest"}];
    var revData=[{"lat": 47.512401, "lng": 19.048637, "name": "Tokaj Wine Bar", "rating": 5, "text": "Really traditional bar, good design.\nThey do not speak English well but you figure it out somehow to order :)\nEnjoyed the wines. Good place for tasting.", "address": "Budapest, Falk Miksa u. 32, 1055 Hungary", "color": "#16a34a"}, {"lat": 47.508738, "lng": 19.055543, "name": "MrAlkohol Drink Shop", "rating": 5, "text": "Awesome selection and quantity of wines & liquors!!", "address": "Budapest, Bajcsy-Zsilinszky \u00fat 59, 1065 Hungary", "color": "#16a34a"}, {"lat": 47.512136, "lng": 19.047947, "name": "Drop Shop Wine Bar", "rating": 3, "text": "Bar is only open after 5 PM. Before that, only bottle sales available", "address": "Budapest, Balassi B\u00e1lint u. 27, 1055 Hungary", "color": "#ca8a04"}, {"lat": 47.497884, "lng": 19.062777, "name": "Fat Mama", "rating": 4, "text": "Good junk foods. Nice plates to share.\nToo much food smell inside.", "address": "Budapest, Kazinczy u. 24, 1075 Hungary", "color": "#65a30d"}, {"lat": 47.506798, "lng": 19.053257, "name": "Ikonik Parlament", "rating": 4, "text": "Nice designed hotel, good complementary coffee. Toilets in the rooms are a little bit weird, only glass door, lack of privacy. Heater does not work.", "address": "Budapest, K\u00e1lm\u00e1n Imre u. 19, 1054 Hungary", "color": "#65a30d"}, {"lat": 47.510099, "lng": 19.054807, "name": "Fittbutiq Bistro", "rating": 3, "text": "No breakfast after 11:30 AM.", "address": "Budapest, Nyugati t\u00e9r 8, 1055 Hungary", "color": "#ca8a04"}, {"lat": 47.511227, "lng": 19.053047, "name": "KOOOL", "rating": 4, "text": "Didn't enjoy ginger shot.\nGood food.", "address": "fszt, Budapest, Szent Istv\u00e1n krt. 21, 1055 Hungary", "color": "#65a30d"}, {"lat": 47.507418, "lng": 19.052829, "name": "SixLetter Coffee Co. - Specialty Coffee Bar & Breakfast, Brunch", "rating": 5, "text": "Good eggs benedict and pistachio croissant", "address": "Budapest, Alkotm\u00e1ny u 21, 1054 Hungary", "color": "#16a34a"}, {"lat": 47.505702, "lng": 19.049447, "name": "Huncutka Bite and Wine", "rating": 3, "text": "Toooo natural wines as glass. If you are not into that, i do not recommend to try.", "address": "Budapest, B\u00e1thory utca 3, 1054 Hungary", "color": "#ca8a04"}, {"lat": 47.500747, "lng": 19.048217, "name": "Brunch & Lunch", "rating": 5, "text": "Best healthy brownie ever.\nGood breakfast", "address": "Budapest, N\u00e1dor u. 14, 1051 Hungary", "color": "#16a34a"}, {"lat": 47.500519, "lng": 19.065283, "name": "Instant-Fogas Complex", "rating": 5, "text": "Enter the place before 11 pm or you will wait a long line", "address": "Budapest, Ak\u00e1cfa u. 51, 1073 Hungary", "color": "#16a34a"}, {"lat": 47.496965, "lng": 19.063346, "name": "Szimpla Kert", "rating": 5, "text": "Enter the place before 7 pm or you will wait for a huge line afterwards.\n\nDo not see any room to sell food", "address": "Budapest, Kazinczy u. 14, 1075 Hungary", "color": "#16a34a"}, {"lat": 47.492594, "lng": 19.064676, "name": "Tasting Table Budapest (Wine Shop)", "rating": 5, "text": "If you make a wine tasting, you need to make a reservation before. It is until 6 pm. However, you can walk in for a wine flight until 8 pm. Good selection of wines and really helpful staff.", "address": "Budapest, Br\u00f3dy S\u00e1ndor u. 22, 1088 Hungary", "color": "#16a34a"}, {"lat": 47.494859, "lng": 19.042556, "name": "Castle Garden Bazaar", "rating": 5, "text": "Awesome place, definitely worth to visit", "address": "Budapest, Ybl Mikl\u00f3s t\u00e9r 2-6, 1013 Hungary", "color": "#16a34a"}, {"lat": 47.505143, "lng": 19.062067, "name": "Champion Wine Vinarium&Gastro Boutique", "rating": 5, "text": "The best tasting place in town. I wish I tried this place in my first day so all days I could have visit here. Perfect wine options, good design, lovely owners. Just amazing!!!", "address": "Budapest, J\u00f3kai t\u00e9r 6, 1061 Hungary", "color": "#16a34a"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[45.7, 16.1],[48.6, 22.9]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (15)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
