  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 22.3193, "lng": 114.1694, "title": "Hong Kong", "slug": "hong-kong"}];
    var revData=[{"lat": 22.305249, "lng": 114.189904, "name": "Flames", "rating": 3, "text": "Food is nice but you can order some food only as a set of menu which includes a soft drink. Even if you do not want it, you cannot order the food only.\n\nNo restrooms inside.\n\nRisotto was ok, beef was a little bit rough.", "address": "Hong Kong, Hung Hom, Shop G10B, Fashion World Site 2 - Cherry Mansions, Whampoa Garden 9 Shung King Street", "color": "#ca8a04"}, {"lat": 22.302123, "lng": 114.17644, "name": "Scarlett Caf\u00e9 & Wine Bar", "rating": 4, "text": "Food is great. Salmon tartar, pike fish, octopus. We really enjoyed.\nI cannot say the same for the wine. Really lack of glass options, which is not great for a wine bar.", "address": "New Austin Commercial Centre, 2 Austin Ave, Tsim Sha Tsui, Hong Kong", "color": "#65a30d"}, {"lat": 22.300853, "lng": 114.179699, "name": "Above & Beyond", "rating": 4, "text": "Really good wine menu.\nDinner is a little bit different. Definitely need to get familiar within chinese food before. Some of them are pretentious. Didn't enjoy passion fruit soup.\nOriginal food but may not be suitable for all.", "address": "28/F, 17 Science Museum Rd, Tsim Sha Tsui, Hong Kong", "color": "#65a30d"}, {"lat": 22.302067, "lng": 114.191089, "name": "noc (Whampoa)", "rating": 5, "text": "Good coffee, perfect breakfast!", "address": "Shop G42, G/F, Whampoa Garden Site 9 Block 1, Tak Fung St, Hung Hom, Hong Kong", "color": "#16a34a"}, {"lat": 22.285157, "lng": 114.148063, "name": "Resbyne Restaurant", "rating": 4, "text": "Wagyu, pasta, orange salad, garlic bread was nice. Selection of wine was not so good.", "address": "G/F, 4 Pound Ln, Sheung Wan, Hong Kong", "color": "#65a30d"}, {"lat": 22.302697, "lng": 114.192331, "name": "Harbour Grand Kowloon", "rating": 4, "text": "Great location and good view. Rooms were nice. Breakfast was meh. If you are staying above 20th floor, you need to change the elevators, which is a little bit long.", "address": "Whampoa Garden, 20 Tak Fung St, Hung Hom, Hong Kong", "color": "#65a30d"}, {"lat": 22.302424, "lng": 114.191734, "name": "O'Thai", "rating": 5, "text": "Really good atmosphere and food. We mostly ate on tapas. Lobster sandwich, calamari and fish taco was the best.", "address": "One Harbourfront, 18 Tak Fung Street, Whampoa Garden, Hung Hom, Hong Kong", "color": "#16a34a"}, {"lat": 22.314466, "lng": 113.934809, "name": "Plaza Premium Lounge (Gate 1, East Hall)", "rating": 3, "text": "There is no western breakfast at all :)", "address": "Hong Kong International Airport, Near Gate 1, Departures, Lantau Island, Hong Kong", "color": "#ca8a04"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[22.15, 113.83],[22.56, 114.43]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (8)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
