    <div class="posts-section"><h2>All Posts</h2><a href="../posts/north-cyprus.html" style="display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:8px;background:var(--card-bg);border-left:3px solid var(--accent);text-decoration:none;color:inherit;margin-bottom:.5rem;transition:background .2s"><div style="flex:1"><div style="font-weight:500;font-size:.9375rem;color:var(--text)">North Cyprus<span style="font-size:.7rem;padding:.1rem .3rem;border-radius:3px;background:#c2410c;color:#fff;font-weight:600;margin-left:.35rem">8/10</span></div><div style="font-size:.75rem;color:var(--text-muted)">City Guide · Sep 27, 2025 · 3 min</div></div></a>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 35.1856, "lng": 33.3823, "title": "North Cyprus", "slug": "north-cyprus"}];
    var revData=[{"lat": 35.148428, "lng": 33.503468, "name": "BosphoreLounge", "rating": 1, "text": "The food is honestly mediocre. We went for breakfast and there was nothing breakfast-like. They threw out leftover meze from the night before. One of the most underwhelming lounges I've ever been to.", "address": "4GX3+99G, Lefko\u015fa 99100", "color": "#dc2626"}, {"lat": 35.118265, "lng": 33.957812, "name": "Devran Beach Restaurant", "rating": 1, "text": "There's probably nothing more absurd than having paid and limited showers at a place like this. You need to buy a token to use the shower. Total nonsense.\n\nOne of the most beautiful seas in the world, yet the beach couldn't be any dirtier. A complete disappointment.\n\nIt has no upside other than the sunbeds. Instead of staying here, go to the facilities inside Kapal\u0131mara\u015f that have tables and chairs without sunbeds; at least you'll have peace of mind.", "address": "4X95+843 Palm Beach Plaj\u0131, Gazima\u011fusa 99450", "color": "#dc2626"}, {"lat": 35.125317, "lng": 33.941817, "name": "Cava Wine Lounge", "rating": 4, "text": "One of the rare places that sells Cypriot wine by the glass. The glass selection is limited though. For a place that calls itself a wine lounge, I honestly couldn't justify having so few options by the glass. But when we didn't like one of the glasses, they noticed and offered to swap it for another. That was a positive.", "address": "Naim Efendi Sk, Gazima\u011fusa 99450", "color": "#65a30d"}, {"lat": 35.12083, "lng": 33.938222, "name": "The Palm House", "rating": 4, "text": "Wine selection is a bit limited. Nice view though. Food is good but service is a bit slow. Staff are friendly and pleasant. A good spot to spend a long time enjoying the view and the weather.", "address": "Laguna Apartments, Palm Beach, Magusa, North", "color": "#65a30d"}, {"lat": 35.12567, "lng": 33.94335, "name": "Castello Restaurant & Bar", "rating": 5, "text": "The food is great, portions are generous, prices are cheap compared to Turkey. We had lamb chops and chicken shish. Each main comes with 5 mezes + halloumi + salad for free. What more could you ask for.\n\nThe staff are very attentive. There are at least 20-30 wine-by-the-glass options, which was quite surprising.", "address": "Liman Yolu Sk No:25, Gazima\u011fusa 9450", "color": "#16a34a"}, {"lat": 35.125307, "lng": 33.942439, "name": "Publik Cafe & Bar", "rating": 4, "text": "A nice cafe. They have 3-4 different wine-by-the-glass options. Self-service. Enjoyable.", "address": "Liman Yolu Sk 13A, Gazima\u011fusa 99450", "color": "#65a30d"}, {"lat": 35.12383, "lng": 33.938873, "name": "La Regina Veneziana Guest House", "rating": 5, "text": "The rooms are beautifully designed, spacious, and new. Just a slight sound insulation issue since the doors etc. are old, but if they fixed that it'd be perfect.\n\nThe owner Tolga bey is very friendly and extremely attentive. Despite our last-minute inability to come and not having a free cancellation, they let us use our booking later. When a taxi driver ditched us on the way back, they even drove us to the station. Much appreciated.\n\nBreakfast is superb, and location-wise it's really enjoyable.", "address": "Kuru \u00c7e\u015fme Sk No:10, Gazima\u011fusa 1506", "color": "#16a34a"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[35, 32.6],[35.7, 34.6]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (7)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
</body>
