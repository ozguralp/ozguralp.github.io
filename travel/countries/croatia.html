  <script>function toggleTheme(){var b=document.getElementById('themeToggle'),d=document.documentElement.getAttribute('data-theme')==='dark';if(d){document.documentElement.removeAttribute('data-theme');b.textContent='Dark';localStorage.setItem('theme','light')}else{document.documentElement.setAttribute('data-theme','dark');b.textContent='Light';localStorage.setItem('theme','dark')}}if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');document.addEventListener('DOMContentLoaded',function(){document.getElementById('themeToggle').textContent='Light'})}</script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var postData=[{"lat": 42.6507, "lng": 18.0944, "title": "Dubrovnik", "slug": "dubrovnik"}];
    var revData=[{"lat": 42.641177, "lng": 18.107668, "name": "Holy Burek", "rating": 5, "text": "Delicious borek's and ayran!", "address": "Ul. od Pu\u010da 22, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.640522, "lng": 18.107782, "name": "M'arden Dubrovnik", "rating": 5, "text": "Place is just great. Lovely atmosphere and different selection of wines. Good alternative wine tasting menus.", "address": "Ul. od Domina 8, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.641795, "lng": 18.108971, "name": "Stara Loza", "rating": 5, "text": "Went for breakfast and it was nice. Omelette and oatmeal was good.", "address": "Prijeko ul. 22, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.641469, "lng": 18.109924, "name": "Barba", "rating": 5, "text": "Best seafood in town. Seafood platter 2 was just great. Amazing octopus burger, great fried squids.", "address": "Bo\u0161kovi\u0107eva ul. 5, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.639983, "lng": 18.111594, "name": "Gianni", "rating": 5, "text": "Best ice creams in town, as well as desserts. Black lotus and brownie was just great.", "address": "Ul. kneza Damjana Jude bb, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.641295, "lng": 18.109721, "name": "Wine Bar \u0160kar Dubrovnik Old Town", "rating": 3, "text": "They only sell their own wines. Service was really good, but I cannot say same for the wines. If you like natural kind of wines, then you can go. But if you are not, I can say you can pass this place.", "address": "Drop\u010deva ul. 2, 20000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.641526, "lng": 18.107039, "name": "Hard Rock Cafe Dubrovnik", "rating": 3, "text": "Food and atmosphere was good as always globally, however cannot say the service for this one. Waiter confused our orders all the time and was a little bit rude.", "address": "Poljana Paska Mili\u010devi\u0107a 4, 20000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.641875, "lng": 18.108728, "name": "Mama's Pot Tavern", "rating": 3, "text": "Went for breakfast, omelette was ok, avocado toast was a disaster. It had barely avocado. Croissant is not croissant at all.", "address": "Prijeko ul. 26, 20000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.641628, "lng": 18.106172, "name": "Dubravka 1836 Restaurant & Cafe", "rating": 3, "text": "Atmosphere is really nice, but I cannot say the same for the food. Ordered a seafood platter for 35 EUR, thinking as the portion would be big. It was neither big nor delicious.\n\nThey have a good wine menu but it seems that the wines are not hold on good circumstances because most of their aromas are gone.", "address": "Brsalje. 1, 20 000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.640691, "lng": 18.108855, "name": "Peppino\u2019s Gelato Factory", "rating": 4, "text": "It was good, but you can find better ones in the old town :)", "address": "Ul. od Pu\u010da 9, 20000, Dubrovnik, Croatia", "color": "#65a30d"}, {"lat": 42.642015, "lng": 18.106354, "name": "Wine Museum Dubrovnik", "rating": 5, "text": "A perfect museum if you are into wine. Good historical information, perfect tasting menus. They also have a shop, which has better prices comparing to the producer's.", "address": "Brsalje ul. 17, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.641755, "lng": 18.10949, "name": "Konoba Captain", "rating": 3, "text": "Went for breakfast, omelette was ok.", "address": "Prijeko ul. 14, 20000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.641598, "lng": 18.110098, "name": "Bakus Wine Bar", "rating": 3, "text": "Their design is really good, but cannot say the same for the wines. The first wine that I tried was damaged. Bartender claimed it is normal. If the owner would not be in there, we were supposed to pay for a damaged wine.", "address": "Prijeko ul. 6, 20000, Dubrovnik, Croatia", "color": "#ca8a04"}, {"lat": 42.641786, "lng": 18.108588, "name": "D'VINO WINE BAR DUBROVNIK", "rating": 5, "text": "Best wine bar in Dubrovnik. If you want to go with flight tasting, you need to go before 9 PM.\n\nThey have a really good variety of glass wines. They also have changing menus for all different months. Really old vintage glasses are also available.", "address": "Palmoti\u0107eva ul. 4a, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.641856, "lng": 18.109344, "name": "House Tereza", "rating": 5, "text": "Perfect location, good sound isolation, clean and wide rooms.", "address": "Petilovrijenci ul. 7, 20000, Dubrovnik, Croatia", "color": "#16a34a"}, {"lat": 42.560571, "lng": 18.262415, "name": "Dubrovnik Airport Adriatic Business Lounge", "rating": 4, "text": "We entered for breakfast. A lot of options for take it with you such as fruit (banana) or sandwiches. Liked the quality. Not too crowded.", "address": "20213, Mo\u010di\u0107i, Croatia", "color": "#65a30d"}];
    var isDark=document.documentElement.getAttribute('data-theme')==='dark';
    var tile=isDark?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    var map=L.map('countryMap',{scrollWheelZoom:true});
    L.tileLayer(tile,{subdomains:'abcd',maxZoom:19}).addTo(map);
    map.fitBounds([[42.2, 13.2],[46.6, 19.5]]);

    var icon=L.divIcon({className:'custom-marker',
      html:'<div style="width:12px;height:12px;background:#c2410c;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>',
      iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});

    postData.forEach(function(p){
      if(p.lat) L.marker([p.lat,p.lng],{icon:icon}).bindPopup(
        '<div class="popup-title">'+p.title+'</div><a class="popup-link" href="../posts/'+p.slug+'.html">Read &rarr;</a>',
        {maxWidth:280}).addTo(map);
    });

    // Reviews overlay - EXACT same as app.js loadGMapsReviews
    var gmapsLayer=L.layerGroup();
    var gmapsVisible=false;
    var ratingColors={5:'#16a34a',4:'#65a30d',3:'#ca8a04',2:'#ea580c',1:'#dc2626'};

    revData.forEach(function(rev){
      if(!rev.lat||!rev.lng) return;
      var color=ratingColors[rev.rating]||'#9ca3af';
      var rIcon=L.divIcon({className:'gmaps-dot',
        html:'<div style="width:8px;height:8px;background:'+color+';border:1.5px solid #fff;border-radius:50%;opacity:.7"></div>',
        iconSize:[8,8],iconAnchor:[4,4],popupAnchor:[0,-6]});
      var stars='★'.repeat(rev.rating)+'☆'.repeat(5-rev.rating);
      var text=rev.text?'<div style="margin:.35rem 0;font-size:.75rem;color:#444;line-height:1.4;max-height:160px;overflow-y:auto">'+rev.text+'</div>':'';
      var addr=rev.address?rev.address.split(',').slice(-2).join(',').trim():'';
      var popup='<div style="font-family:\'DM Sans\',sans-serif;font-size:.8125rem;max-width:260px">'
        +'<div style="font-weight:600">'+rev.name+'</div>'
        +'<div style="color:#ca8a04">'+stars+'</div>'
        +text
        +'<div style="color:#666;font-size:.7rem;margin-top:.25rem">'+addr+'</div>'
        +'</div>';
      L.marker([rev.lat,rev.lng],{icon:rIcon}).bindPopup(popup,{maxWidth:250}).addTo(gmapsLayer);
    });

    // Toggle button on map - EXACT same style as app.js
    var toggleCtrl=L.control({position:'topright'});
    toggleCtrl.onAdd=function(){
      var div=L.DomUtil.create('div','gmaps-toggle');
      div.innerHTML='<button onclick="toggleGMaps()" id="gmapsBtn" style="background:var(--card-bg,#f5f5f4);border:1px solid var(--border,#e7e5e4);border-radius:6px;padding:4px 10px;font-family:\'DM Sans\',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;color:var(--text-muted,#57534e);white-space:nowrap">📍 Show Place Reviews (16)</button>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    toggleCtrl.addTo(map);

    function toggleGMaps(){
      gmapsVisible=!gmapsVisible;
      if(gmapsVisible){gmapsLayer.addTo(map);document.getElementById('gmapsBtn').style.borderColor='#c2410c';document.getElementById('gmapsBtn').style.color='#c2410c';}
      else{map.removeLayer(gmapsLayer);document.getElementById('gmapsBtn').style.borderColor='';document.getElementById('gmapsBtn').style.color='';}
    }
  </script>
  
</body>
